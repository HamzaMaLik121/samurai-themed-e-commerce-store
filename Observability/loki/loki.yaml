# ── Loki Configuration ───────────────────────────────────────────────────
# Log aggregation system for collecting and querying application logs.
# Receives logs via OTLP from the OpenTelemetry Collector.

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: info

# ── Ingestion ────────────────────────────────────────────────────────────
ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 30m
  chunk_retain_period: 1m
  max_chunk_age: 1h
  chunk_target_size: 1_572_864  # 1.5 MB
  block_size: 262144            # 256 KB
  wal:
    enabled: true
    dir: /loki/wal

# ── Schema Configuration ────────────────────────────────────────────────
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

# ── Storage ─────────────────────────────────────────────────────────────
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

# ── Limits ──────────────────────────────────────────────────────────────
limits_config:
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 25
  max_entries_limit_per_query: 5000
  max_query_series: 10000
  max_query_bytes_read: 0  # Unlimited
  max_global_streams_per_user: 5000
  max_line_size: 1MB
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # 7 days
  retention_period: 720h            # 30 days

# ── Query Limits ─────────────────────────────────────────────────────────
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
        ttl: 24h

# ── Frontend & Querier ──────────────────────────────────────────────────
frontend:
  max_outstanding_per_tenant: 2048
  compress_responses: true
  log_queries_longer_than: 5s

querier:
  max_concurrent: 10

# ── Compactor ──────────────────────────────────────────────────────────
compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# ── Analytics ──────────────────────────────────────────────────────────
analytics:
  reporting_enabled: false

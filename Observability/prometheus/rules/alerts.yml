# ── Prometheus Alerting Rules ──────────────────────────────────────────
# Groups organize related alerts. Each alert fires when the expression
# evaluates to a non-zero value for the specified duration.

groups:
  # ═══════════════════════════════════════════════════════════════════
  # SERVICE AVAILABILITY
  # ═══════════════════════════════════════════════════════════════════
  - name: service_availability
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="samurai-backend"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Backend API is down"
          description: "The Flask backend has been unreachable for >1 minute."
          runbook_url: "https://wiki.samuraishop.com/runbooks/backend-down"

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status_code=~"5.."}[5m])
          /
          rate(http_requests_total[5m]) * 100 > 5
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "High HTTP error rate ({{ $value | humanizePercentage }})"
          description: "Error rate on {{ $labels.endpoint }} has exceeded 5% for 5 minutes."

      - alert: SlowRequests
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "P95 request latency > 2s on {{ $labels.endpoint }}"
          description: "The 95th percentile latency has exceeded 2 seconds."

  # ═══════════════════════════════════════════════════════════════════
  # DATABASE
  # ═══════════════════════════════════════════════════════════════════
  - name: database
    interval: 30s
    rules:
      - alert: MySQLDown
        expr: mysql_up == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "MySQL database is down"
          description: "The MySQL database has been unreachable for >1 minute."

      - alert: MySQLHighConnections
        expr: max_over_time(mysql_global_status_threads_connected[5m]) / mysql_global_variables_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "MySQL connection pool at {{ $value | humanizePercentage }}"
          description: "Database connections are above 80% of max capacity."

      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High rate of slow MySQL queries"
          description: "Slow query rate ({{ $value | humanize }}/s) exceeds threshold."

  # ═══════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════
  - name: infrastructure
    interval: 60s
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "CPU usage > 80% on {{ $labels.instance }}"
          description: "CPU has been above 80% for >10 minutes (current: {{ $value }}%)."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Memory usage > 85% on {{ $labels.instance }}"
          description: "Memory has been above 85% for >10 minutes."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Disk space < 10% on {{ $labels.instance }}"
          description: "Disk on {{ $labels.device }} at {{ $labels.mountpoint }} is critically low ({{ $value | humanizePercentage }} free)."

      - alert: DiskIOHigh
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "High disk I/O on {{ $labels.instance }}"
          description: "Disk I/O is above 50% utilization for >10 minutes."

  # ═══════════════════════════════════════════════════════════════════
  # BUSINESS METRICS
  # ═══════════════════════════════════════════════════════════════════
  - name: business
    interval: 60s
    rules:
      - alert: CheckoutFailureSpike
        expr: rate(checkout_failures_total[10m]) > 0.5
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Checkout failure rate spiking"
          description: "Checkout failures are occurring at {{ $value | humanize }}/s. Possible payment processor issue."

      - alert: LowOrderRate
        expr: rate(orders_created_total[1h]) < 0.1
        for: 30m
        labels:
          severity: warning
          team: business
        annotations:
          summary: "Unusually low order rate"
          description: "Order creation rate has dropped below 0.1/s for >30 minutes."

  # ═══════════════════════════════════════════════════════════════════
  # OBSERVABILITY STACK HEALTH
  # ═══════════════════════════════════════════════════════════════════
  - name: observability
    interval: 30s
    rules:
      - alert: PrometheusDown
        expr: absent(up{job="prometheus"}) or up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Prometheus is down"
          description: "The Prometheus server is not reachable. All alerting is affected."

      - alert: GrafanaDown
        expr: absent(up{job="grafana"}) or up{job="grafana"} == 0
        for: 1m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Grafana is down"
          description: "The Grafana dashboard server is not reachable."

      - alert: OTelCollectorDown
        expr: up{instance="otel-collector:8888"} == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "OpenTelemetry Collector is down"
          description: "Telemetry collection pipeline is interrupted."

      - alert: HighSpanDropRate
        expr: rate(otelcol_exporter_send_failed_span_count[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Elevated span drop rate"
          description: "Span export failures > 10/s — check Tempo connectivity or queue backlog."

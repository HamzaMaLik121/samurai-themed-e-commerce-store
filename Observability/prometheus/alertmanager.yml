# ── Prometheus Alertmanager Configuration ───────────────────────────────

global:
  resolve_timeout: 5m
  slack_api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"

route:
  group_by: ["alertname", "severity", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "pagerduty"
      repeat_interval: 15m
      routes:
        - match:
            team: backend
          receiver: "pagerduty-backend"
        - match:
            team: infrastructure
          receiver: "pagerduty-infra"

    - match:
        severity: warning
      receiver: "slack-warnings"
      group_wait: 1m

    - match:
        team: business
      receiver: "slack-business"

receivers:
  - name: "default"
    slack_configs:
      - channel: "#alerts"
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true

  - name: "slack-warnings"
    slack_configs:
      - channel: "#alerts-warnings"
        title: '⚠️ [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true

  - name: "slack-business"
    slack_configs:
      - channel: "#business-metrics"
        title: '📊 [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true

  - name: "pagerduty"
    pagerduty_configs:
      - routing_key: "YOUR_PAGERDUTY_KEY"
        severity: "critical"
        description: "{{ .CommonAnnotations.summary }}"
        details:
          firing: "{{ .Alerts.Firing | len }}"
          resolved: "{{ .Alerts.Resolved | len }}"

  - name: "pagerduty-backend"
    pagerduty_configs:
      - routing_key: "YOUR_PAGERDUTY_KEY_BACKEND"
        severity: "critical"
        description: "{{ .CommonAnnotations.summary }}"
        client: "Samurai Backend"

  - name: "pagerduty-infra"
    pagerduty_configs:
      - routing_key: "YOUR_PAGERDUTY_KEY_INFRA"
        severity: "critical"
        description: "{{ .CommonAnnotations.summary }}"
        client: "Samurai Infrastructure"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]

# ── Prometheus Global Configuration ────────────────────────────────────
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

  external_labels:
    cluster: "samurai-prod"
    environment: "production"

# ── Rule Files ────────────────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/rules/alerts.yml"
  - "/etc/prometheus/rules/recording.yml"

# ── Scrape Configurations ─────────────────────────────────────────────
scrape_configs:
  # ── OpenTelemetry Collector Self-Metrics ───────────────────────────
  - job_name: "otel-collector"
    honor_timestamps: true
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: "otel-collector"
          component: "telemetry-pipeline"

  # ── OpenTelemetry Span Metrics ────────────────────────────────────
  - job_name: "otel-span-metrics"
    honor_timestamps: true
    scrape_interval: 30s
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: "otel-collector"
          component: "span-metrics"

  # ── Backend (Flask API) ───────────────────────────────────────────
  - job_name: "samurai-backend"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - "host.docker.internal:5000"
        labels:
          app: "samurai"
          tier: "backend"
          language: "python"

  # ── Node Exporter ─────────────────────────────────────────────────
  - job_name: "node-exporter"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "node-exporter:9100"
        labels:
          app: "infrastructure"
          component: "host-metrics"

  # ── MySQL / Database Metrics ──────────────────────────────────────
  - job_name: "mysql"
    static_configs:
      - targets:
          - "host.docker.internal:9104"  # mysqld_exporter
        labels:
          app: "samurai"
          tier: "database"

  # ── Docker Daemon Metrics ─────────────────────────────────────────
  - job_name: "docker"
    static_configs:
      - targets:
          - "host.docker.internal:9323"  # docker metrics
        labels:
          app: "infrastructure"
          component: "container-runtime"

  # ── Backend Health Check (Blackbox) ───────────────────────────────
  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://api.samuraishop.com/health
          - http://localhost:5000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

# ── Grafana Tempo Configuration ──────────────────────────────────────────
# Backend for distributed tracing storage and querying.
# Supports OTLP gRPC ingestion and the Tempo query API for Grafana.

server:
  http_listen_port: 3200
  grpc_listen_port: 4317  # OTLP ingestion port
  log_level: info

# ── Distributor (Ingestion) ────────────────────────────────────────────
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
          max_recv_msg_size_mib: 16
        http:
          endpoint: 0.0.0.0:4318

  # Forwarders allow sending spans to external processors
  forwarders: []

# ── Ingester ────────────────────────────────────────────────────────────
ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  max_block_duration: 30m
  max_block_bytes: 500_000_000  # 500MB per block

# ── Storage ─────────────────────────────────────────────────────────────
storage:
  trace:
    backend: local                     # File-based storage (for single-node)
    wal:
      path: /tmp/tempo/wal
      encoding: snappy
    local:
      path: /tmp/tempo/blocks
    block:
      bloom_filter_false_positive: 0.05
      encoding: zstd
      index_downsample_bytes: 1000
    cache:                      # Optional: use Redis or Memcached for production
      background:
        writeback_goroutines: 5
        writeback_buffer: 10000

  # For production, swap to:
  # backend: s3
  # s3:
  #   bucket: tempo-traces
  #   endpoint: s3.amazonaws.com
  #   access_key: ...
  #   secret_key: ...

# ── Compactor ───────────────────────────────────────────────────────────
compactor:
  compaction:
    block_retention: 336h  # 14 days

# ── Query Frontend ──────────────────────────────────────────────────────
query_frontend:
  max_outstanding_per_tenant: 100
  search:
    max_duration: 168h  # Max search window: 7 days
    query_ingesters_until: 30m

# ── Query Service ───────────────────────────────────────────────────────
querier:
  max_concurrent_queries: 20
  search:
    query_timeout: 30s

# ── Metrics Generator ───────────────────────────────────────────────────
# Derives Prometheus-style metrics from spans (requires metrics-generator
# to be enabled)
metrics_generator:
  registry:
    collection_interval: 15s
    stale_duration: 5m
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /tmp/tempo/generator/traces
  processor:
    service_graphs:
      dimensions: []
    span_metrics:
      dimensions:
        - http.method
        - http.status_code
        - service.name
        - span.kind

# ── Overrides ───────────────────────────────────────────────────────────
overrides:
  defaults:
    ingestion:
      rate_strategy: local
      max_traces_per_user: 10000
      max_global_traces_per_user: 100000
    global:
      max_bytes_per_trace: 50_000_000  # 50 MB per trace

# ── OpenTelemetry Collector Configuration ──────────────────────────────
# Receives telemetry via OTLP, processes & batches, then exports to
# Prometheus (metrics), Tempo (traces), and Loki (logs).
#
# Ports:
#   4317  - OTLP gRPC receiver
#   4318  - OTLP HTTP receiver
#   13133 - Health check
#   8888  - Self-metrics (Prometheus scrape)
#   55679 - ZPages debugging

receivers:
  # ── OTLP Receiver ──────────────────────────────────────────────────
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
        max_concurrent_streams: 100
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*
            - https://*
          allowed_headers: [content-type]

  # ── Prometheus Self-Metrics ────────────────────────────────────────
  prometheus:
    config:
      scrape_configs:
        - job_name: "otel-collector"
          scrape_interval: 15s
          static_configs:
            - targets: ["0.0.0.0:8888"]

  # ── Host Metrics ───────────────────────────────────────────────────
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      load: {}
      filesystem: {}
      memory: {}
      network: {}
      processes: {}

  # ── Health Check (internal) ────────────────────────────────────────
  jaeger_skipper: null  # placeholders only—removed at runtime
  zipkin: null

processors:
  # ── Batch Processing ───────────────────────────────────────────────
  batch:
    timeout: 1s
    send_batch_size: 50
    send_batch_max_size: 500

  # ── Memory Limiter ─────────────────────────────────────────────────
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # ── Sampling / Filtering ───────────────────────────────────────────
  probabilistic_sampler:
    hash_seed: 42
    sampling_percentage: 50.0

  # ── Attribute Enrichment ───────────────────────────────────────────
  attributes:
    actions:
      - key: environment
        value: production
        action: upsert
      - key: service.version
        from_attribute: service.version
        action: insert

  # ── Span Metrics ───────────────────────────────────────────────────
  spanmetrics:
    metrics_exporter: prometheus
    latency_histogram_buckets:
      - 1ms
      - 5ms
      - 10ms
      - 25ms
      - 50ms
      - 100ms
      - 250ms
      - 500ms
      - 1s
      - 2.5s
      - 5s
      - 10s

exporters:
  # ── Prometheus Exporter (Metrics) ──────────────────────────────────
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true
    namespace: samurai

  # ── OTLP gRPC Exporter (Traces → Tempo, Logs → Loki) ──────────────
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      num_consumers: 10
      queue_size: 5000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # ── Loki Exporter (Logs) ───────────────────────────────────────────
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true
    default_labels_enabled:
      - service.name
      - service.namespace
      - service.instance.id
      - environment
    tenant: "samurai"

  # ── Debug / Logging Exporter ───────────────────────────────────────
  debug:
    verbosity: detailed
    sampling_initial: 2
    sampling_thereafter: 100

  # ── File Exporter (Backup) ─────────────────────────────────────────
  file:
    path: /var/log/otel/export.json
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 10

service:
  pipelines:
    # ── Traces Pipeline ────────────────────────────────────────────
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes, batch]
      exporters: [otlp/tempo, debug]

    # ── Metrics Pipeline ───────────────────────────────────────────
    metrics:
      receivers: [otlp, hostmetrics]
      processors: [memory_limiter, batch, spanmetrics]
      exporters: [prometheus, debug]

    # ── Logs Pipeline ──────────────────────────────────────────────
    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes, batch]
      exporters: [loki, debug, file]

  # ── Telemetry for Collector Itself ─────────────────────────────────
  telemetry:
    logs:
      level: info
      encoding: console
      development: false
    metrics:
      level: detailed
      address: 0.0.0.0:8888

  # ── Extensions ─────────────────────────────────────────────────────
extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:55679
  zpages:
    endpoint: 0.0.0.0:55679
